services:
  - type: web
    name: vehicle-diagnostic-core-api
    runtime: node
    rootDir: .
    buildCommand: pnpm install --no-frozen-lockfile && pnpm --filter @core/shared build && pnpm --filter @core/api build
    startCommand: pnpm --filter @core/api start
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        sync: false
      - key: PLATE_PROVIDER
        value: mock
      - key: OPENAI_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
